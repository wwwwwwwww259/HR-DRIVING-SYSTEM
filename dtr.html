<div class="container mt-4">

<h2>DTR Report</h2>

<div class="card p-4 mb-4">

<input
id="employeeSearch"
class="form-control mb-2"
placeholder="Employee Name">

<button
class="btn btn-primary"
onclick="generateDTR()">

Generate DTR

</button>

</div>

<div class="table-responsive">

<table class="table table-bordered table-striped">

    <thead class="table-dark">

        <tr>

            <th>Employee</th>
            <th>Date</th>
            <th>AM IN</th>
            <th>BREAK</th>
            <th>PM IN</th>
            <th>TIME OUT</th>
            <th>Work Hours</th>
            <th>OT Hours</th>
            <th>Status</th>

        </tr>

    </thead>

    <tbody id="dtrTable">

    </tbody>

</table>
